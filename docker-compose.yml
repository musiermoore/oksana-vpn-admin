services:
    app:
        container_name: wireguard_app
        env_file:
            - .env
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        build:
            context: .
            dockerfile: docker/app/Dockerfile
        working_dir: /var/www/html
        command: php artisan serve --host=0.0.0.0 --port=8000
        ports:
            - '${APP_PORT:-8000}:8000'
        volumes:
            - '.:/var/www/html'
        networks:
            - app
            - oksana-vpn
        depends_on:
            mysql:
                condition: service_healthy

    vite:
        container_name: wireguard_vite
        platform: linux/amd64
        env_file:
            - .env
        build:
            context: .
            dockerfile: docker/vite/Dockerfile
        working_dir: /var/www/html
        command: sh -lc "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ]; then npm install; fi && npm run dev"
        ports:
            - '${VITE_PORT:-5173}:5173'
        volumes:
            - '.:/var/www/html'
            - vite-node-modules:/var/www/html/node_modules
        environment:
            VITE_PORT: '${VITE_PORT:-5173}'
            VITE_HMR_HOST: '${VITE_HMR_HOST:-localhost}'
            VITE_HMR_PORT: '${VITE_HMR_PORT:-5173}'
            CHOKIDAR_USEPOLLING: 'true'
        networks:
            - app
        depends_on:
            - app

    mysql:
        container_name: wireguard_mysql
        env_file:
            - .env
        image: mysql:8.0
        ports:
            - '${FORWARD_DB_PORT:-3306}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
        volumes:
            - mysql-data:/var/lib/mysql
            - ./docker/mysql/init:/docker-entrypoint-initdb.d
        networks:
            - app
        healthcheck:
            test:
                - CMD
                - mysqladmin
                - ping
                - '-p${DB_PASSWORD}'
            retries: 5
            timeout: 5s
            interval: 5s
            start_period: 15s

networks:
    app:
        driver: bridge
    oksana-vpn:
        external: true

volumes:
    mysql-data:
        driver: local
    vite-node-modules:
        driver: local
