services:
    app:
        container_name: wireguard_app_prod
        env_file:
            - .env
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        build:
            context: .
            dockerfile: docker/app/Dockerfile.prod
        restart: unless-stopped
        ports:
            - '${APP_PORT:-8000}:8000'
        networks:
            - app
            - oksana-vpn
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_healthy

    horizon:
        container_name: wireguard_horizon_prod
        env_file:
            - .env
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        build:
            context: .
            dockerfile: docker/app/Dockerfile.prod
        restart: unless-stopped
        command: ["php", "artisan", "horizon"]
        networks:
            - app
            - oksana-vpn
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_healthy

    mysql:
        container_name: wireguard_mysql_prod
        env_file:
            - .env
        image: mysql:8.0
        restart: unless-stopped
        ports:
            - '127.0.0.1:${FORWARD_DB_PORT:-3306}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
        volumes:
            - mysql-data-prod:/var/lib/mysql
            - ./docker/mysql/init:/docker-entrypoint-initdb.d
            - ./docker/mysql/conf.d/99-binlog-retention.cnf:/etc/mysql/conf.d/99-binlog-retention.cnf:ro
        networks:
            - app
        healthcheck:
            test:
                - CMD
                - mysqladmin
                - ping
                - '-p${DB_PASSWORD}'
            retries: 5
            timeout: 5s
            interval: 5s
            start_period: 15s

    redis:
        container_name: wireguard_redis_prod
        image: redis:7-alpine
        restart: unless-stopped
        command: ["redis-server", "--appendonly", "yes"]
        volumes:
            - redis-data-prod:/data
        networks:
            - app
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 5
            timeout: 5s
            interval: 5s
            start_period: 5s

networks:
    app:
        driver: bridge
    oksana-vpn:
        external: true

volumes:
    mysql-data-prod:
        driver: local
    redis-data-prod:
        driver: local
